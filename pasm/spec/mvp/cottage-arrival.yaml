entities:
  - system: cottage-arrival-mvp
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Arrival MVP
      summary: A small headless vertical slice now proves a narrow autonomous Toilet need, player toilet orders, two-floor navigation, non-spatial object-claim contention, safe cancellation, and semantic event assertions before pub or social-persistence work.
      references: [cottage-arrival-scenario, scenario-test-harness, agent-autonomy, smart-objects, tile-navigation]

  - component: cottage-map-and-portals
    core:
      status: implemented
      confidence: confirmed
      title: Two-Storey Cottage Map
      summary: A hand-authored 32x24-per-floor fixture now has paired stairs with one-tick traversal and live portal occupancy. Detailed rooms and object placement remain later content work.
      references: [tile-navigation, cottage-arrival-scenario]
    implementation:
      status: declared
      paths: [assets/content/maps/cottage.ron, assets/content/scenarios/cottage_arrival.ron]

  - component: cottage-household
    core:
      status: implemented
      confidence: confirmed
      title: Newcomer Pair
      summary: Two named newcomers form the initial household fixture, with stable authored IDs and runtime SimIds. Their contrasting traits and relationship state are introduced by later work; the implemented autonomous behaviour is the narrow Toilet-need path.
      references: [agent-autonomy, cottage-arrival-scenario]

  - component: cottage-needs-and-affordances
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Needs and Affordances
      summary: "The first interaction is a data-defined contested toilet: its authored affordance claims a named slot and hands only while executing. A deliberately narrow scalar Toilet need decays, selects a Human conduct method through a named RON plan with intention-owned hysteresis, and recovers only when ObjectUseCompleted. Explicit player work suppresses competing autonomous requests. The remaining household interactions and need motivation remain later MVP work."
      references: [smart-objects, initial-needs-and-recipes]
    implementation:
      status: declared
      paths: [crates/village_sim/src/lib.rs, assets/content/objects/cottage.ron, assets/content/people/newcomers.ron, assets/content/conducts/human.ron, assets/content/plans/toilet_need.ron]

  - component: cottage-content-fixture
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Content Fixture
      summary: Shared RON content currently defines the Cottage Arrival scenario, two named newcomers, a fixed seed, starting placements, a compact two-floor map, a placed toilet object, the Human conduct, and its toilet plan. Items, recipes, and wider interaction domains remain deferred.
      references: [content-registry, cottage-arrival-scenario]
    implementation:
      status: declared
      paths: [assets/content/scenarios/cottage_arrival.ron, assets/content/people/newcomers.ron, assets/content/maps/cottage.ron, assets/content/objects/cottage.ron]

  - component: cottage-contention-test
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Contention Acceptance Test
      summary: One composite headless test runs two identical fixed-seed Cottage fixtures. Both newcomers traverse the stairs to distinct upstairs destinations and return; a direct toilet request waits behind a higher-priority player order, that order cancels safely, and the waiting request completes. It asserts deferred arrivals, semantic events, released claims, no resident overlap, and equal ledgers. Object use is intentionally not yet spatially situated.
      references: [scenario-test-harness, cottage-map-and-portals, cottage-household, cottage-needs-and-affordances]

  - component: cottage-player-order-cancellation
    core:
      status: implemented
      confidence: confirmed
      title: Deferred Player Toilet Order and Cancellation
      summary: The Cottage fixture accepts a typed QueueUseToilet command at the following tick, returns immutable accepted or rejected receipts on the normal deferred-event path, and cancels active or queued player tasks at their atomic safe boundary. Active cancellation releases the toilet slot and hands claim before TaskCancelled is published.
      references: [player-command-boundary, cottage-needs-and-affordances, cottage-contention-test]
    implementation:
      status: declared
      paths: [crates/village_sim/src/lib.rs]

  - component: cottage-playable-client
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Playable Client
      summary: The first runnable Bevy tableau centres its initial ground-floor camera on the fixed Cottage fixture and draws an opaque base layer beneath its two floors, toilet, furniture, and distinct layered newcomer presentations from curated 32px assets. Selection and camera controls are implemented in later playable-client components.
      references: [village-client, player-command-boundary, pixel-art-presentation]
    implementation:
      status: declared
      paths: [crates/village_game/src/main.rs, crates/village_sim/src/lib.rs, assets/client]

  - component: cottage-resident-inspection
    core:
      status: implemented
      confidence: confirmed
      title: Selected Newcomer Status Card
      summary: The Cottage client keeps presentation-only resident selection. Clicking a newcomer or their curated UI selector shows their authoritative display name, Toilet need, autonomous Toilet intention, and live queued or active player task state from the immutable Cottage snapshot. No selection state or UI interaction mutates simulation state.
      references: [village-client, agent-autonomy, player-command-boundary]
    implementation:
      status: declared
      paths: [crates/village_game/src/main.rs, crates/village_sim/src/lib.rs, assets/client/ui]

  - component: cottage-camera-and-floor-focus
    core:
      status: implemented
      confidence: confirmed
      title: Cottage Camera, Follow, and Floor Focus
      summary: The client supports right-drag pixel-snapped pan, wheel zoom constrained to integral 1x through 4x display magnifications, manual floor buttons, and a selected-resident follow toggle. Follow changes floor focus from the resident's authoritative tile snapshot after a stair traversal without altering selection or simulation state.
      references: [village-client, pixel-art-presentation, tile-navigation]
    implementation:
      status: declared
      paths: [crates/village_game/src/main.rs]

  - component: cottage-toilet-order-feedback
    core:
      status: implemented
      confidence: confirmed
      title: Selected Newcomer Toilet Order
      summary: The selected newcomer can receive an agent-first Use toilet order for the fixed Cottage fixture. The client allocates a stable task ID, immediately presents it as pending, then consumes one accepted or rejected immutable receipt from the normal deferred event path and projects the resulting queued or active task state. The fixture toilet remains explicit but is not client-targetable.
      references: [village-client, player-command-boundary, cottage-player-order-cancellation]
    implementation:
      status: declared
      paths: [crates/village_game/src/main.rs, crates/village_sim/src/lib.rs, assets/client/audio]

  - component: cottage-player-task-cancellation-feedback
    core:
      status: implemented
      confidence: confirmed
      title: Contended Player Task Cancellation Feedback
      summary: The selected newcomer exposes Cancel only while their immutable Cottage snapshot has a queued or active player task. The client submits CancelPlayerTask at the normal deferred boundary, names its receipt as a cancellation, and consumes semantic waiting, start, completion, and cancellation events from the append-only ledger once. Active cancellation visibly reports that the toilet was released, after which the waiting request can progress under simulation authority.
      references: [village-client, player-command-boundary, cottage-player-order-cancellation]
    implementation:
      status: declared
      paths: [crates/village_game/src/main.rs, crates/village_sim/src/lib.rs]
