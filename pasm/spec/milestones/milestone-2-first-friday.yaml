entities:
  - system: milestone-2-first-friday
    core:
      status: proposed
      confidence: confirmed
      title: Milestone 2 — First Friday
      summary: Expand Cottage Arrival into one evening spanning cottage, shop, and King's Head pub. Prove invitation pressure, travel, ordinary shared-object queueing, and one witnessed social event without attempting full village scale.
      references: [cottage-arrival-mvp, first-friday-invitation, pub-visit-and-contention, initial-social-consequences]

  - component: first-friday-invitation
    core:
      status: proposed
      confidence: confirmed
      title: Neighbour Invitation and Time-Bound Commitment
      summary: Around 16:30, read from the deterministic in-world day clock, a scheduled neighbour invitation fires exactly once and publishes a NeighbourInvitation world event naming its host and the 19:00 event time; the client announces it. Turning that invitation into a normal commitment or reaction candidate that competes for autonomy, never a direct override, remains the next step.
      references: [agent-autonomy, player-command-boundary, world-time, world-events]

  - component: pub-visit-and-contention
    core:
      status: proposed
      confidence: confirmed
      title: Pub Travel and Service Contention
      summary: The King's Head is a navigable region of the ground floor with an authored bar smart object exposing a single service slot. Household agents travel there from the cottage and contend for the occupied bar slot without advance reservation through the existing deterministic claim arbitration — one is served while the other waits, then proceeds on release. Richer responses such as joining a visible social queue or choosing an alternative fixture remain later work.
      references: [tile-navigation, smart-objects, capability-arbitration]

  - component: initial-social-consequences
    core:
      status: proposed
      confidence: confirmed
      title: Participant and Witness Consequences
      summary: Taking Mr Pargeter's corner seat while the pub is open emits a PargeterSeatTaken world event and forms distinct perceptions — the participant sat in the seat, each co-present witness tutted — and establishes the visible household knowledge that the seat is his. This is the deliberately narrow first cut of the wider social-consequences model; memories, relationship ledgers, and beliefs remain later work.
      references: [world-events, social-consequences, world-time]

  - component: pub-seat-lore
    core:
      status: proposed
      confidence: confirmed
      title: The Pargeter Seat
      summary: The left-hand corner seat is an authored smart object in the King's Head. Sitting there while the pub is open provokes a witness tut and the friendly household lore that Mr Pargeter received the news about the pig there. It has no supernatural or need effect; the client narrates it in the event feed and status card.
      references: [setting-direction, initial-social-consequences, smart-objects]
